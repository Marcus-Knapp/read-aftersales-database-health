<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burton Database Insights</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f0d;--card:#111916;--border:#1e2d26;
  --accent:#2d8f5c;--accent-lt:#47b87a;
  --text:#e8ede9;--text2:#7a8f82;--text3:#4a5f52;
  --danger:#c45d2c;--warn:#d4a843;--success:#2d8f5c;
  --blue:#3d7ea6;--purple:#7a4d8a;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.header{background:linear-gradient(135deg,var(--card),#0d1f16);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.header h1 span{color:var(--accent-lt)}
.header-meta{color:var(--text3);font-size:11px}
.container{max-width:1400px;margin:0 auto;padding:0 28px 40px}
.tabs{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.tab{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--text3)}
.filters{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;align-items:center}
.filters select{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;font-size:12px;font-family:'JetBrains Mono',monospace}
.filters .clear{background:transparent;border:1px solid var(--danger);border-radius:8px;color:var(--danger);padding:6px 12px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.filters .count{color:var(--text3);font-size:11px}
.section-title{margin:36px 0 20px}
.section-title h2{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.section-title p{color:var(--text2);font-size:13px;margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;position:relative;overflow:hidden}
.kpi-icon{position:absolute;top:12px;right:16px;font-size:28px;opacity:.15}
.kpi-label{color:var(--text2);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-size:32px;font-weight:700;line-height:1}
.kpi-sub{color:var(--text3);font-size:12px;margin-top:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:1000px){.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:800px){.grid-2{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{color:var(--text2);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;height:300px}
.chart-wrap.short{height:220px}
.chart-wrap.tall{height:400px}
.health-bar{margin-bottom:14px}
.health-bar .hb-head{display:flex;justify-content:space-between;margin-bottom:4px}
.health-bar .hb-label{color:var(--text2);font-size:12px}
.health-bar .hb-val{color:var(--text);font-size:12px;font-weight:600}
.health-bar .hb-track{background:#0d1410;border-radius:6px;height:8px;overflow:hidden}
.health-bar .hb-fill{height:100%;border-radius:6px;transition:width .8s ease}
.health-ring{display:inline-flex;align-items:center;justify-content:center;width:140px;height:140px;border-radius:50%}
.health-ring-inner{width:110px;height:110px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;flex-direction:column}
.health-ring-score{font-size:36px;font-weight:700}
.health-ring-label{font-size:10px;color:var(--text3);margin-top:2px}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:8px}
.contact-item{background:#0d1410;border-radius:8px;padding:16px;text-align:center}
.contact-item .ci-icon{font-size:24px;margin-bottom:4px}
.contact-item .ci-val{color:var(--text);font-size:20px;font-weight:700}
.contact-item .ci-label{color:var(--text3);font-size:10px;margin-top:2px}
.contact-item .ci-pct{color:var(--text2);font-size:11px}
.upload-btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif}
.upload-btn input{display:none}
.report{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;line-height:1.8;font-size:14px;color:var(--text2)}
.report h3{color:var(--text);font-size:18px;font-weight:700;margin-top:0}
.report h4{color:var(--accent-lt);margin-top:24px}
.report strong{color:var(--text)}
.report .recs{background:#0d1410;border-radius:8px;padding:16px;margin-top:8px;display:flex;flex-direction:column;gap:10px;font-size:13px}
.upload-history{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.upload-row{display:flex;justify-content:space-between;padding:8px 12px;background:#0d1410;border-radius:6px;font-size:12px}
.hidden{display:none}
.landing{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.landing h1{font-size:28px;font-weight:700;margin-bottom:8px}
.landing p{color:var(--text2);margin-bottom:24px}
.landing .upload-btn{font-size:15px;padding:12px 32px;border-radius:10px}
.dim-card{background:#0d1410;border-radius:10px;padding:20px;text-align:center;border:1px solid var(--border)}
.dim-card .dim-score{font-size:28px;font-weight:700;margin:8px 0 4px}
.dim-card .dim-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.dim-card .dim-detail{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}
.dim-card .dim-grade{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-top:8px}
.insight-box{background:#0d1410;border-left:3px solid var(--accent-lt);border-radius:0 8px 8px 0;padding:14px 18px;margin-top:12px;font-size:13px;color:var(--text2);line-height:1.6}
.insight-box strong{color:var(--text)}
.insight-box.warning{border-left-color:var(--warn)}
.insight-box.danger{border-left-color:var(--danger)}
.insight-box.success{border-left-color:var(--success)}
</style>
</head>
<body>

<div id="landing" class="landing">
  <div>
    <div style="font-size:48px;margin-bottom:16px">🔧</div>
    <h1>Burton Database Insights</h1>
    <p>Upload your customer CSV to get started</p>
    <label class="upload-btn">Upload CSV<input type="file" accept=".csv" onchange="handleFile(this.files[0])"></label>
    <div id="landing-history" class="mono" style="margin-top:24px;color:var(--text3);font-size:12px"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <div>
      <h1><span>⬡</span> Burton Database Insights</h1>
      <div id="header-meta" class="header-meta mono"></div>
    </div>
    <label class="upload-btn">📤 Upload New<input type="file" accept=".csv" onchange="handleFile(this.files[0])"></label>
  </div>
  <div class="container">
    <div class="tabs" id="tabs"></div>
    <div class="filters" id="filters-bar"></div>
    <div id="tab-overview" class="tab-content"></div>
    <div id="tab-brands" class="tab-content hidden"></div>
    <div id="tab-retention" class="tab-content hidden"></div>
    <div id="tab-health" class="tab-content hidden"></div>
    <div id="tab-report" class="tab-content hidden"></div>
  </div>
</div>

<script>
let DATA=[],FILTERED=[],STATS=null,brandFilter="All",statusFilter="All",activeTab="overview",uploadTime=null,uploadHistory=[];
const charts={};

function parseCSV(t){const l=t.split(/\r?\n/).filter(l=>l.trim()),h=l[0].replace(/^\uFEFF/,"").split(",").map(h=>h.trim()),r=[];for(let i=1;i<l.length;i++){const v=l[i].split(","),o={};h.forEach((h,j)=>o[h]=(v[j]||"").trim());r.push(o)}return r}
function parseBool(v){if(typeof v==='boolean')return v;if(!v)return false;return v.toString().toUpperCase()==="TRUE"}
function parseDate(s){if(!s)return null;const m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);return m?new Date(+m[3],+m[2]-1,+m[1]):null}
function normMake(mk){if(!mk)return"Unknown";const u=mk.toUpperCase(),m={"SEAT":"SEAT","MG-ROVER":"MG Rover","MG":"MG","MERCEDES-BENZ":"Mercedes-Benz","BMW":"BMW","VOLKSWAGEN":"Volkswagen","LAND ROVER":"Land Rover","ALFA ROMEO":"Alfa Romeo","ASTON MARTIN":"Aston Martin","ROLLS ROYCE":"Rolls Royce"};return m[u]||mk.charAt(0).toUpperCase()+mk.slice(1).toLowerCase()}
function normModel(md){if(!md)return"Unknown";const u=md.toUpperCase(),m={"TIGUAN":"Tiguan","UP":"Up","TOUREG":"Touareg","TOUAREG":"Touareg","GOLF 8":"Golf"};return m[u]||md.charAt(0).toUpperCase()+md.slice(1).toLowerCase()}

function processData(rows){
  const now=new Date();
  return rows.map(r=>{
    const created=parseDate(r["Customer Created Date"]),lastVisit=parseDate(r["Last Workshop Visit"]),motExpiry=parseDate(r["MOT Expiry Date"]),serviceDue=parseDate(r["Service Due Date"]);
    const make=normMake(r["Make"]),model=normModel(r["Model"]);
    const days=lastVisit?Math.floor((now-lastVisit)/86400000):null;
    let status="Never Visited";
    if(lastVisit){status=days<=365?"Active":days<=730?"At Risk":"Lapsed"}
    const motStatus=!motExpiry?"Unknown":motExpiry<now?"Expired":motExpiry<new Date(now.getTime()+30*86400000)?"Due Soon":"Valid";
    const serviceStatus=!serviceDue?"Unknown":serviceDue<now?"Overdue":serviceDue<new Date(now.getTime()+30*86400000)?"Due Soon":"Upcoming";
    return{make,model,created,lastVisit,motExpiry,serviceDue,status,motStatus,serviceStatus,
      allowEmail:parseBool(r["Allow Email"]),allowSMS:parseBool(r["Allow SMS"]),
      mobileTPS:parseBool(r["Mobile TPS"]),telTPS:parseBool(r["Telephone TPS"]),
      motReminder:parseBool(r["MOT Reminder"]),serviceReminder:parseBool(r["Allow Service Reminder"]),
      customerType:r["Customer Type"]||"Unspecified",postCode:r["Post Code"]||""};
  });
}

function countBy(a,k){const m={};a.forEach(r=>{const v=r[k]||"Unknown";m[v]=(m[v]||0)+1});return m}

function computeStats(data,allData){
  const total=data.length,byMake=countBy(data,"make"),topMakes=Object.entries(byMake).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const byModel=countBy(data,"model"),topModels=Object.entries(byModel).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const byStatus=countBy(data,"status"),byMotStatus=countBy(data,"motStatus"),byServiceStatus=countBy(data,"serviceStatus"),byType=countBy(data,"customerType");
  const contactable={email:data.filter(r=>r.allowEmail).length,sms:data.filter(r=>r.allowSMS).length,either:data.filter(r=>r.allowEmail||r.allowSMS).length,neither:data.filter(r=>!r.allowEmail&&!r.allowSMS).length,motReminder:data.filter(r=>r.motReminder).length,serviceReminder:data.filter(r=>r.serviceReminder).length};

  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const mg={};data.forEach(r=>{if(r.created){const k=r.created.getFullYear()+"-"+String(r.created.getMonth()+1).padStart(2,"0");mg[k]=(mg[k]||0)+1}});
  const growthData=Object.entries(mg).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,c])=>{const[y,mo]=m.split("-");return{month:m,label:months[+mo-1]+" "+y.slice(2),count:c}});
  let cum=0;growthData.forEach(d=>{cum+=d.count;d.cumulative=cum});

  const vm={};data.forEach(r=>{if(r.lastVisit){const k=r.lastVisit.getFullYear()+"-"+String(r.lastVisit.getMonth()+1).padStart(2,"0");vm[k]=(vm[k]||0)+1}});
  const visitData=Object.entries(vm).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,c])=>{const[y,mo]=m.split("-");return{month:m,label:months[+mo-1]+" "+y.slice(2),count:c}});

  const ry={};data.forEach(r=>{if(r.created){const yr=r.created.getFullYear();if(!ry[yr])ry[yr]={total:0,active:0,atRisk:0,lapsed:0};ry[yr].total++;if(r.status==="Active")ry[yr].active++;if(r.status==="At Risk")ry[yr].atRisk++;if(r.status==="Lapsed")ry[yr].lapsed++}});
  const retentionData=Object.entries(ry).sort((a,b)=>+a[0]-+b[0]).map(([yr,d])=>({year:yr,...d,retentionRate:Math.round(d.active/d.total*100)}));

  // ── 6-DIMENSION HEALTH SCORING ──
  const activeCount=byStatus["Active"]||0,atRiskCount=byStatus["At Risk"]||0,lapsedCount=byStatus["Lapsed"]||0,neverCount=byStatus["Never Visited"]||0;
  const everVisited=total-neverCount;

  // 1. ENGAGEMENT: Of past visitors, how many are still engaged (active or at-risk)?
  const engagementRate=everVisited>0?(activeCount+atRiskCount)/everVisited:0;
  const engagementScore=Math.round(engagementRate*100);

  // 2. RETENTION: Of past visitors, how many are active (12mo)?
  const retentionRate=everVisited>0?activeCount/everVisited:0;
  const retentionScore=Math.round(retentionRate*100);

  // 3. CONTACTABILITY
  const contactRate=total>0?contactable.either/total:0;
  const contactScore=Math.round(contactRate*100);

  // 4. MARKETING READINESS: Reminders enabled for contactable customers
  const cc=contactable.either||1;
  const reminderCov=contactable.serviceReminder/cc,motRemCov=contactable.motReminder/cc;
  const marketingScore=Math.round(((reminderCov+motRemCov)/2)*100);

  // 5. DATA COMPLETENESS
  const hasPC=data.filter(r=>r.postCode&&r.postCode!=='.'&&r.postCode.length>2).length;
  const hasType=data.filter(r=>r.customerType!=="Unspecified").length;
  const hasMOT=total-(byMotStatus["Unknown"]||0);
  const dataScore=Math.round(((hasPC/total)+(hasType/total)+(hasMOT/total))/3*100);

  // 6. FRESHNESS: What % of DB has been active in last 2 years or is a recent addition?
  const fresh=activeCount+atRiskCount+neverCount;
  const freshnessScore=Math.round(fresh/total*100);

  // Weighted overall
  const overallScore=Math.round(engagementScore*.25+contactScore*.20+marketingScore*.20+dataScore*.15+freshnessScore*.10+retentionScore*.10);

  const healthDimensions={
    engagement:{score:engagementScore,label:"Engagement",detail:`${(activeCount+atRiskCount).toLocaleString()} of ${everVisited.toLocaleString()} past visitors still engaged`,weight:25},
    retention:{score:retentionScore,label:"Retention",detail:`${activeCount.toLocaleString()} visited in last 12 months of ${everVisited.toLocaleString()} who ever visited`,weight:10},
    contactability:{score:contactScore,label:"Contactability",detail:`${contactable.either.toLocaleString()} reachable by email or SMS`,weight:20},
    marketing:{score:marketingScore,label:"Marketing Readiness",detail:`Service reminders: ${Math.round(reminderCov*100)}% · MOT reminders: ${Math.round(motRemCov*100)}%`,weight:20},
    dataQuality:{score:dataScore,label:"Data Completeness",detail:`Post codes: ${Math.round(hasPC/total*100)}% · Customer type: ${Math.round(hasType/total*100)}% · MOT dates: ${Math.round(hasMOT/total*100)}%`,weight:15},
    freshness:{score:freshnessScore,label:"Database Freshness",detail:`${fresh.toLocaleString()} records are active, at-risk, or recent additions`,weight:10}
  };

  const vwData=allData.filter(r=>r.make==="Volkswagen"),vwModels=countBy(vwData,"model"),topVWModels=Object.entries(vwModels).sort((a,b)=>b[1]-a[1]).slice(0,10);

  return{total,byMake,topMakes,byModel,topModels,byStatus,byMotStatus,byServiceStatus,byType,contactable,growthData,visitData,retentionData,
    overallScore,healthDimensions,activeRate:activeCount/total,contactRate,engagementRate,retentionRate,
    topVWModels,vwTotal:vwData.length,everVisited,activeCount,atRiskCount,lapsedCount,neverCount};
}

async function handleFile(f){if(!f)return;const t=await f.text(),rows=parseCSV(t);DATA=processData(rows);uploadTime=new Date().toISOString();uploadHistory.push({date:uploadTime,records:DATA.length,filename:f.name});try{await window.storage.set("upload_history",JSON.stringify(uploadHistory))}catch(e){}applyFilters();document.getElementById("landing").classList.add("hidden");document.getElementById("app").classList.remove("hidden");renderAll()}

function applyFilters(){FILTERED=DATA.slice();if(brandFilter!=="All")FILTERED=FILTERED.filter(r=>r.make===brandFilter);if(statusFilter!=="All")FILTERED=FILTERED.filter(r=>r.status===statusFilter);STATS=computeStats(FILTERED,DATA)}
function renderAll(){renderHeader();renderTabs();renderFilters();renderOverview();renderBrands();renderRetention();renderHealth();renderReport();showTab(activeTab)}
function renderHeader(){const m=[];if(uploadTime)m.push("Last uploaded: "+new Date(uploadTime).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}));if(uploadHistory.length>1)m.push(uploadHistory.length+" uploads total");if(STATS)m.push(STATS.total.toLocaleString()+" records");document.getElementById("header-meta").textContent=m.join(" · ")}
function renderTabs(){const t=[["overview","Overview"],["brands","Brand & Model Mix"],["retention","Retention & Trends"],["health","Database Health"],["report","MD Report"]];document.getElementById("tabs").innerHTML=t.map(([id,l])=>`<button class="tab ${activeTab===id?'active':''}" onclick="showTab('${id}')">${l}</button>`).join("")}
function showTab(id){activeTab=id;document.querySelectorAll(".tab-content").forEach(e=>e.classList.add("hidden"));document.getElementById("tab-"+id).classList.remove("hidden");renderTabs();setTimeout(()=>{Object.values(charts).forEach(c=>{try{c.resize()}catch(e){}})},100)}

function renderFilters(){
  const tb=Object.entries(countBy(DATA,"make")).sort((a,b)=>b[1]-a[1]).slice(0,25).map(([m])=>m);
  let h=`<select onchange="brandFilter=this.value;applyFilters();renderAll()"><option value="All">All Brands</option>${tb.map(b=>`<option value="${b}" ${brandFilter===b?'selected':''}>${b}</option>`).join("")}</select>
  <select onchange="statusFilter=this.value;applyFilters();renderAll()"><option value="All">All Statuses</option>${["Active","At Risk","Lapsed","Never Visited"].map(s=>`<option value="${s}" ${statusFilter===s?'selected':''}>${s}</option>`).join("")}</select>`;
  if(brandFilter!=="All"||statusFilter!=="All")h+=`<button class="clear" onclick="brandFilter='All';statusFilter='All';applyFilters();renderAll()">✕ Clear Filters</button>`;
  h+=`<span class="count mono">Showing ${FILTERED.length.toLocaleString()} of ${DATA.length.toLocaleString()} records</span>`;
  document.getElementById("filters-bar").innerHTML=h;
}

function kpi(l,v,s,c,i){return`<div class="kpi"><div class="kpi-icon">${i}</div><div class="kpi-label mono">${l}</div><div class="kpi-value" style="color:${c||'var(--accent-lt)'}">${v}</div>${s?`<div class="kpi-sub mono">${s}</div>`:''}</div>`}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}
function makeChart(id,cfg){destroyChart(id);const c=document.getElementById(id);if(!c)return;Chart.defaults.color='#7a8f82';Chart.defaults.borderColor='#1e2d26';Chart.defaults.font.family="'JetBrains Mono', monospace";Chart.defaults.font.size=11;charts[id]=new Chart(c,cfg)}
function gc(s){return s>=75?"var(--success)":s>=50?"var(--accent-lt)":s>=30?"var(--warn)":"var(--danger)"}
function gl(s){return s>=75?"Strong":s>=50?"Fair":s>=30?"Needs Work":"Critical"}

function renderOverview(){
  const S=STATS;if(!S)return;
  const p=v=>Math.round(v*100);
  document.getElementById("tab-overview").innerHTML=`
  <div class="section-title"><h2>Dashboard Overview</h2><p class="mono">Key performance indicators at a glance</p></div>
  <div class="kpi-grid">
    ${kpi("Total Customers",S.total.toLocaleString(),"","var(--accent-lt)","👥")}
    ${kpi("Active (12mo)",S.activeCount.toLocaleString(),p(S.activeRate)+"% of database","var(--success)","✓")}
    ${kpi("At Risk (12-24mo)",S.atRiskCount.toLocaleString(),"","var(--warn)","⚠")}
    ${kpi("Lapsed (24mo+)",S.lapsedCount.toLocaleString(),"","var(--danger)","✕")}
    ${kpi("Health Score",S.overallScore+"/100","6-dimension weighted · "+gl(S.overallScore),gc(S.overallScore),"♥")}
    ${kpi("Contactable",p(S.contactRate)+"%",S.contactable.either.toLocaleString()+" by email or SMS","var(--accent-lt)","✉")}
  </div>
  <div class="grid-2">
    <div class="card"><div class="card-title mono">Customer Status Distribution</div><div class="chart-wrap short"><canvas id="ch-status"></canvas></div></div>
    <div class="card"><div class="card-title mono">Customer Type Split</div><div class="chart-wrap short"><canvas id="ch-type"></canvas></div></div>
  </div>
  <div class="grid-2">
    <div class="card"><div class="card-title mono">MOT Status</div><div class="chart-wrap short"><canvas id="ch-mot"></canvas></div></div>
    <div class="card"><div class="card-title mono">Service Status</div><div class="chart-wrap short"><canvas id="ch-service"></canvas></div></div>
  </div>`;
  const sc={"Active":"#2d8f5c","At Risk":"#d4a843","Lapsed":"#c45d2c","Never Visited":"#4a5f52"};
  const se=Object.entries(S.byStatus);
  makeChart("ch-status",{type:"doughnut",data:{labels:se.map(e=>e[0]),datasets:[{data:se.map(e=>e[1]),backgroundColor:se.map(e=>sc[e[0]]||"#3d7ea6"),borderColor:"#0a0f0d",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}}}});
  const te=Object.entries(S.byType).sort((a,b)=>b[1]-a[1]);
  makeChart("ch-type",{type:"bar",data:{labels:te.map(e=>e[0]),datasets:[{data:te.map(e=>e[1]),backgroundColor:"#2d8f5c",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});
  const mc={"Valid":"#2d8f5c","Due Soon":"#d4a843","Expired":"#c45d2c","Unknown":"#4a5f52"};
  const me=Object.entries(S.byMotStatus);
  makeChart("ch-mot",{type:"doughnut",data:{labels:me.map(e=>e[0]),datasets:[{data:me.map(e=>e[1]),backgroundColor:me.map(e=>mc[e[0]]||"#3d7ea6"),borderColor:"#0a0f0d",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}}}});
  const sve=Object.entries(S.byServiceStatus);
  makeChart("ch-service",{type:"doughnut",data:{labels:sve.map(e=>e[0]),datasets:[{data:sve.map(e=>e[1]),backgroundColor:sve.map(e=>mc[e[0]]||"#3d7ea6"),borderColor:"#0a0f0d",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}}}});
}

function renderBrands(){
  const S=STATS;if(!S)return;
  const C=["#1a5f3a","#2d8f5c","#47b87a","#6fd49a","#a3e4be","#c45d2c","#e8834a","#f4a573","#1b4965","#3d7ea6","#5da2c9","#8bc4e0","#7a4d8a","#a374b5","#c49dd6"];
  document.getElementById("tab-brands").innerHTML=`
  <div class="section-title"><h2>Brand & Model Mix</h2><p class="mono">Brand and model distribution across your database</p></div>
  <div class="card"><div class="card-title mono">Top 15 Makes</div><div class="chart-wrap tall"><canvas id="ch-makes"></canvas></div></div>
  ${S.vwTotal>0?`<div class="card" style="margin-top:14px"><div class="card-title mono">Volkswagen Model Breakdown</div><div class="mono" style="color:var(--text3);font-size:11px;margin-bottom:12px">${S.vwTotal.toLocaleString()} VW vehicles · ${Math.round(S.vwTotal/DATA.length*100)}% of total database</div><div class="chart-wrap" style="height:340px"><canvas id="ch-vw"></canvas></div></div>`:''}
  <div class="card" style="margin-top:14px"><div class="card-title mono">Top 15 Models (All Brands)</div><div class="chart-wrap tall"><canvas id="ch-models"></canvas></div></div>`;
  makeChart("ch-makes",{type:"bar",data:{labels:S.topMakes.map(e=>e[0]),datasets:[{data:S.topMakes.map(e=>e[1]),backgroundColor:S.topMakes.map((_,i)=>C[i%C.length]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});
  if(S.vwTotal>0)makeChart("ch-vw",{type:"bar",data:{labels:S.topVWModels.map(e=>e[0]),datasets:[{data:S.topVWModels.map(e=>e[1]),backgroundColor:S.topVWModels.map((_,i)=>C[i%C.length]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});
  makeChart("ch-models",{type:"bar",data:{labels:S.topModels.map(e=>e[0]),datasets:[{data:S.topModels.map(e=>e[1]),backgroundColor:S.topModels.map((_,i)=>C[i%C.length]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});
}

function renderRetention(){
  const S=STATS;if(!S)return;
  document.getElementById("tab-retention").innerHTML=`
  <div class="section-title"><h2>Retention & Trends</h2><p class="mono">How your customer base has grown and how well you retain them</p></div>
  <div class="card"><div class="card-title mono">Database Growth Over Time (Cumulative)</div><div class="chart-wrap"><canvas id="ch-growth"></canvas></div></div>
  <div class="card" style="margin-top:14px"><div class="card-title mono">New Customers Per Month</div><div class="chart-wrap"><canvas id="ch-newcust"></canvas></div></div>
  <div class="card" style="margin-top:14px"><div class="card-title mono">Workshop Visits Per Month</div><div class="chart-wrap"><canvas id="ch-visits"></canvas></div></div>
  <div class="card" style="margin-top:14px"><div class="card-title mono">Retention by Customer Cohort Year</div><div class="chart-wrap"><canvas id="ch-cohort"></canvas></div></div>`;
  makeChart("ch-growth",{type:"line",data:{labels:S.growthData.map(d=>d.label),datasets:[{data:S.growthData.map(d=>d.cumulative),borderColor:"#47b87a",backgroundColor:"rgba(45,143,92,0.15)",fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"},ticks:{maxTicksLimit:14}},y:{grid:{color:"#1e2d26"}}}}});
  makeChart("ch-newcust",{type:"bar",data:{labels:S.growthData.map(d=>d.label),datasets:[{data:S.growthData.map(d=>d.count),backgroundColor:"#2d8f5c",borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:14}},y:{grid:{color:"#1e2d26"}}}}});
  makeChart("ch-visits",{type:"bar",data:{labels:S.visitData.map(d=>d.label),datasets:[{data:S.visitData.map(d=>d.count),backgroundColor:"#3d7ea6",borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:14}},y:{grid:{color:"#1e2d26"}}}}});
  makeChart("ch-cohort",{type:"bar",data:{labels:S.retentionData.map(d=>d.year),datasets:[
    {data:S.retentionData.map(d=>d.active),backgroundColor:"#2d8f5c",label:"Active",stack:"a"},
    {data:S.retentionData.map(d=>d.atRisk),backgroundColor:"#d4a843",label:"At Risk",stack:"a"},
    {data:S.retentionData.map(d=>d.lapsed),backgroundColor:"#c45d2c",label:"Lapsed",stack:"a"}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}},scales:{x:{grid:{display:false},stacked:true},y:{grid:{color:"#1e2d26"},stacked:true}}}});
}

function renderHealth(){
  const S=STATS;if(!S)return;
  const sc=S.overallScore,scC=gc(sc),dims=S.healthDimensions;

  function dc(dim){const d=dims[dim],c=gc(d.score),bg=d.score>=75?"rgba(45,143,92,0.08)":d.score>=50?"rgba(71,184,122,0.06)":d.score>=30?"rgba(212,168,67,0.08)":"rgba(196,93,44,0.08)";
    return`<div class="dim-card" style="background:${bg}"><div class="dim-label mono">${d.label}</div><div class="dim-score" style="color:${c}">${d.score}<span style="font-size:14px;color:var(--text3)">/100</span></div><div class="dim-grade" style="background:${c}22;color:${c}">${gl(d.score)}</div><div class="dim-detail mono">${d.detail}</div><div class="mono" style="font-size:10px;color:var(--text3);margin-top:4px">Weight: ${d.weight}%</div></div>`}

  function hb(l,p,c){return`<div class="health-bar"><div class="hb-head"><span class="hb-label mono">${l}</span><span class="hb-val mono" style="color:${c}">${p}%</span></div><div class="hb-track"><div class="hb-fill" style="width:${p}%;background:linear-gradient(90deg,${c},${c}aa)"></div></div></div>`}

  let ins='';
  if(dims.engagement.score<30)ins+=`<div class="insight-box danger"><strong>⚡ Engagement is critical.</strong> Only ${Math.round(S.engagementRate*100)}% of customers who have ever visited your workshop are still engaged (visited in the last 2 years). The majority of your database consists of historically accumulated records that haven't returned. Consider a win-back campaign targeting the ${S.atRiskCount.toLocaleString()} at-risk customers before they fully lapse.</div>`;
  else if(dims.engagement.score<50)ins+=`<div class="insight-box warning"><strong>⚠ Engagement needs attention.</strong> ${Math.round(S.engagementRate*100)}% of past visitors are still engaged. Focus retention efforts on the ${S.atRiskCount.toLocaleString()} at-risk customers.</div>`;
  if(dims.contactability.score>=75)ins+=`<div class="insight-box success"><strong>✓ Contactability is a strength.</strong> ${Math.round(S.contactRate*100)}% of your database can be reached — this gives you a strong platform for outbound campaigns.</div>`;
  if(dims.marketing.score>=60)ins+=`<div class="insight-box success"><strong>✓ Marketing reminders are well configured.</strong> Most contactable customers have service and MOT reminders enabled. Ensure your reminder automation is running reliably to capture this revenue.</div>`;
  else if(dims.marketing.score<40)ins+=`<div class="insight-box warning"><strong>⚠ Reminder coverage is low.</strong> Many contactable customers don't have MOT or service reminders — this is missed revenue on autopilot.</div>`;
  if(dims.dataQuality.score<50)ins+=`<div class="insight-box warning"><strong>📋 Data completeness could be improved.</strong> Key fields like customer type and post code have gaps. Better data enables better segmentation and targeting.</div>`;
  if(dims.freshness.score<40)ins+=`<div class="insight-box danger"><strong>🗑️ Database is heavily weighted towards lapsed records.</strong> ${S.lapsedCount.toLocaleString()} customers (${Math.round(S.lapsedCount/S.total*100)}%) haven't visited in over 2 years. Consider archiving the oldest lapsed records to give a clearer picture of your active business.</div>`;

  let hist='';
  if(uploadHistory.length>0)hist=`<div class="card" style="margin-top:14px"><div class="card-title mono">Upload History</div><div class="upload-history">${uploadHistory.slice().reverse().map(u=>`<div class="upload-row mono"><span style="color:var(--text2)">${new Date(u.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</span><span style="color:var(--text3)">${u.filename}</span><span style="color:var(--accent-lt)">${u.records.toLocaleString()} records</span></div>`).join("")}</div></div>`;

  document.getElementById("tab-health").innerHTML=`
  <div class="section-title"><h2>Database Health</h2><p class="mono">Six dimensions that tell you how usable and valuable your database really is</p></div>
  <div class="card" style="padding:28px">
    <div style="display:flex;align-items:center;gap:32px;flex-wrap:wrap">
      <div style="text-align:center">
        <div class="health-ring" style="background:conic-gradient(${scC} ${sc*3.6}deg, var(--border) 0deg)"><div class="health-ring-inner"><span class="health-ring-score" style="color:${scC}">${sc}</span><span class="health-ring-label mono">OVERALL</span></div></div>
      </div>
      <div style="flex:1;min-width:280px">
        <div style="font-size:16px;font-weight:700;margin-bottom:4px">Overall Database Health: <span style="color:${scC}">${gl(sc)}</span></div>
        <div class="mono" style="color:var(--text3);font-size:12px;line-height:1.6;margin-bottom:16px">Weighted average of 6 dimensions: Engagement (25%), Contactability (20%), Marketing Readiness (20%), Data Completeness (15%), Freshness (10%), Retention (10%)</div>
        ${hb("Engagement",dims.engagement.score,gc(dims.engagement.score))}
        ${hb("Contactability",dims.contactability.score,gc(dims.contactability.score))}
        ${hb("Marketing Readiness",dims.marketing.score,gc(dims.marketing.score))}
        ${hb("Data Completeness",dims.dataQuality.score,gc(dims.dataQuality.score))}
        ${hb("Freshness",dims.freshness.score,gc(dims.freshness.score))}
        ${hb("Retention",dims.retention.score,gc(dims.retention.score))}
      </div>
    </div>
  </div>
  <div class="grid-3" style="margin-top:14px">${dc("engagement")}${dc("retention")}${dc("contactability")}${dc("marketing")}${dc("dataQuality")}${dc("freshness")}</div>
  ${ins?`<div style="margin-top:20px"><div class="card-title mono" style="margin-bottom:8px">What This Means</div>${ins}</div>`:''}
  <div class="card" style="margin-top:14px;padding:24px">
    <div class="card-title mono">Contactability Breakdown</div>
    <div class="contact-grid">
      ${[["Allow Email",S.contactable.email,"✉"],["Allow SMS",S.contactable.sms,"💬"],["Either Channel",S.contactable.either,"📡"],["Unreachable",S.contactable.neither,"🚫"],["MOT Reminder On",S.contactable.motReminder,"🔔"],["Service Reminder On",S.contactable.serviceReminder,"🔧"]].map(([l,v,i])=>
        `<div class="contact-item"><div class="ci-icon">${i}</div><div class="ci-val">${v.toLocaleString()}</div><div class="ci-label mono">${l}</div><div class="ci-pct mono">${Math.round(v/S.total*100)}%</div></div>`).join("")}
    </div>
  </div>
  ${hist}`;
}

function renderReport(){
  const S=STATS;if(!S)return;
  const vwC=DATA.filter(r=>r.make==="Volkswagen").length,vwP=Math.round(vwC/DATA.length*100),d=S.healthDimensions;
  document.getElementById("tab-report").innerHTML=`
  <div class="section-title"><h2>MD Report</h2><p class="mono">Executive summary for Managing Director review</p></div>
  <div class="report">
    <h3>📊 Burton Database — Executive Summary</h3>
    <p class="mono" style="color:var(--text3);font-size:11px">Generated: ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})} · Data: ${S.total.toLocaleString()} customer records</p>

    <h4>1. Database Size & Health</h4>
    <p>Your database contains <strong>${S.total.toLocaleString()}</strong> customer records with an overall health score of <strong style="color:${gc(S.overallScore)}">${S.overallScore}/100 (${gl(S.overallScore)})</strong>. This is built from six dimensions: Engagement (${d.engagement.score}), Contactability (${d.contactability.score}), Marketing Readiness (${d.marketing.score}), Data Completeness (${d.dataQuality.score}), Freshness (${d.freshness.score}), and Retention (${d.retention.score}).</p>
    <p>Of the database, <strong>${S.activeCount.toLocaleString()}</strong> (${Math.round(S.activeRate*100)}%) are active. <strong style="color:var(--warn)">${S.atRiskCount.toLocaleString()}</strong> are at risk and <strong style="color:var(--danger)">${S.lapsedCount.toLocaleString()}</strong> have lapsed. A further <strong>${S.neverCount.toLocaleString()}</strong> have no workshop visit on record.</p>

    <h4>2. Brand Concentration</h4>
    <p>Volkswagen dominates at <strong>${vwC.toLocaleString()}</strong> vehicles (${vwP}%). This is both a strength (specialisation) and a risk (dependency). Top VW models: Golf, Polo, Passat, Tiguan, T-Roc.</p>
    <p>Other notable brands: Hyundai (${(S.byMake["Hyundai"]||0).toLocaleString()}), Audi (${(S.byMake["Audi"]||0).toLocaleString()}), Ford (${(S.byMake["Ford"]||0).toLocaleString()}), Skoda (${(S.byMake["Skoda"]||0).toLocaleString()}).</p>

    <h4>3. Contactability & Marketing</h4>
    <p>Contactability is a clear strength at <strong style="color:var(--success)">${Math.round(S.contactRate*100)}%</strong> — ${S.contactable.either.toLocaleString()} customers reachable. Only <strong>${S.contactable.neither.toLocaleString()}</strong> are unreachable.</p>
    <p>MOT reminders: <strong>${S.contactable.motReminder.toLocaleString()}</strong> · Service reminders: <strong>${S.contactable.serviceReminder.toLocaleString()}</strong>.</p>

    <h4>4. MOT & Service Opportunity</h4>
    <p>Expired MOTs: <strong style="color:var(--danger)">${(S.byMotStatus["Expired"]||0).toLocaleString()}</strong> · Overdue services: <strong style="color:var(--danger)">${(S.byServiceStatus["Overdue"]||0).toLocaleString()}</strong>. While many relate to lapsed customers, filtering for active + contactable + overdue is your immediate revenue opportunity.</p>
    <p><strong style="color:var(--warn)">${(S.byMotStatus["Due Soon"]||0).toLocaleString()}</strong> MOTs due in 30 days — priority outbound contacts.</p>

    <h4>5. Key Recommendations</h4>
    <div class="recs">
      <div><span style="color:var(--danger);font-weight:700">⚡ URGENT:</span> Target the ${S.atRiskCount.toLocaleString()} at-risk customers with a service/MOT offer before they lapse.</div>
      <div><span style="color:var(--warn);font-weight:700">📋 DATA QUALITY:</span> Clean duplicate brands (SEAT/Seat, Tiguan/TIGUAN) and populate missing Customer Type (${(S.byType["Unspecified"]||0).toLocaleString()} records).</div>
      <div><span style="color:var(--success);font-weight:700">📈 GROWTH:</span> VW dependency at ${vwP}% is high. Diversify with other VAG brands and independents.</div>
      <div><span style="color:var(--blue);font-weight:700">📡 CONTACT:</span> Ensure reminders fire for all ${S.contactable.either.toLocaleString()} contactable customers. Chase the ${(S.byMotStatus["Due Soon"]||0).toLocaleString()} MOTs due in 30 days.</div>
      <div><span style="color:var(--purple);font-weight:700">🗑️ CLEANSE:</span> Archive the ${S.lapsedCount.toLocaleString()} lapsed customers (2+ years inactive) to sharpen reporting and lift the health score.</div>
    </div>

    <h4>6. Customer Type Mix</h4>
    <p>Private (${(S.byType["Private"]||0).toLocaleString()}), Trade (${(S.byType["Trade"]||0).toLocaleString()}), Corporate/Fleet (${(S.byType["Corporate/Fleet"]||0).toLocaleString()}), Business (${(S.byType["Business"]||0).toLocaleString()}), Motability (${(S.byType["Motability"]||0).toLocaleString()}). Unspecified: ${(S.byType["Unspecified"]||0).toLocaleString()} (${Math.round((S.byType["Unspecified"]||0)/S.total*100)}%) — improving this enables better segmentation.</p>
  </div>`;
}

(async()=>{try{const s=await window.storage.get("upload_history");if(s)uploadHistory=JSON.parse(s.value)}catch(e){}const l=document.getElementById("landing-history");if(uploadHistory.length>0&&l){const u=uploadHistory[uploadHistory.length-1];l.textContent="Last upload: "+new Date(u.date).toLocaleDateString("en-GB")+" ("+u.records.toLocaleString()+" records)"}})();
</script>
</body>
